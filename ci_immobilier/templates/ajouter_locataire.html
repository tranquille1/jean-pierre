{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>➕ Ajouter un Locataire</h2>
    <form method="POST">
        <label for="nom">Nom *</label>
        <input type="text" id="nom" name="nom" required placeholder="Ex: Kouamé">
        
        <label for="prenom">Prénom *</label>
        <input type="text" id="prenom" name="prenom" required placeholder="Ex: Jean-Marc">
        
        <label for="telephone">Téléphone *</label>
        <input type="tel" id="telephone" name="telephone" required placeholder="Ex: 07 01 02 03 04">
        
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Ex: jean@example.com">
        
        <label for="cni_numero">Numéro CNI (Carte Nationale d'Identité)</label>
        <input type="text" id="cni_numero" name="cni_numero" placeholder="Ex: 1234567A89">
        
        <label for="profession">Profession</label>
        <input type="text" id="profession" name="profession" placeholder="Ex: Commerçant, Enseignant...">
        
        <label for="propriete_id">Propriété louée</label>
        <select id="propriete_id" name="propriete_id">
            <option value="">Sélectionner une propriété</option>
            {% for propriete in proprietes %}
            <option value="{{ propriete.id }}">{{ propriete.nom }} - {{ propriete.commune }}</option>
            {% endfor %}
        </select>
        
        <button type="submit" class="btn btn-green">Enregistrer le locataire</button>
        <a href="/locataires" class="btn" style="background: #6c757d;">Annuler</a>
    </form>
</div>
{% endblock %}
