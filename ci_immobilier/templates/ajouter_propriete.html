{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>➕ Ajouter une Propriété</h2>
    <form method="POST">
        <label for="nom">Nom de la propriété *</label>
        <input type="text" id="nom" name="nom" required placeholder="Ex: Résidence Les Palmiers, Villa Alassane...">
        
        <label for="adresse">Adresse complète *</label>
        <input type="text" id="adresse" name="adresse" required placeholder="Ex: Cocody Riviera 3, Yopougon Sicogi...">
        
        <label for="commune">Commune *</label>
        <select id="commune" name="commune" required>
            <option value="">Sélectionner une commune</option>
            <option value="Cocody">Cocody</option>
            <option value="Yopougon">Yopougon</option>
            <option value="Plateau">Plateau</option>
            <option value="Marcory">Marcory</option>
            <option value="Treichville">Treichville</option>
            <option value="Adjamé">Adjamé</option>
            <option value="Abobo">Abobo</option>
            <option value="Koumassi">Koumassi</option>
            <option value="Port-Bouët">Port-Bouët</option>
            <option value="Attécoubé">Attécoubé</option>
            <option value="Bingerville">Bingerville</option>
            <option value="Songon">Songon</option>
            <option value="Anyama">Anyama</option>
        </select>
        
        <label for="type_logement">Type de logement *</label>
        <select id="type_logement" name="type_logement" required>
            <option value="">Sélectionner un type</option>
            <option value="Studio">Studio</option>
            <option value="Appartement">Appartement</option>
            <option value="Villa">Villa</option>
            <option value="Duplex">Duplex</option>
            <option value="Chambre">Chambre</option>
            <option value="Local commercial">Local commercial</option>
        </select>
        
        <label for="nb_pieces">Nombre de pièces</label>
        <input type="number" id="nb_pieces" name="nb_pieces" min="1" value="1">
        
        <label for="loyer_mensuel">Loyer mensuel (FCFA) *</label>
        <input type="number" id="loyer_mensuel" name="loyer_mensuel" required placeholder="Ex: 150000">
        
        <label for="proprietaire">Nom du propriétaire *</label>
        <input type="text" id="proprietaire" name="proprietaire" required>
        
        <label for="telephone_proprio">Téléphone propriétaire</label>
        <input type="tel" id="telephone_proprio" name="telephone_proprio" placeholder="Ex: 07 01 02 03 04">
        
        <label>
            <input type="checkbox" name="disponible" checked>
            Disponible à la location
        </label>
        
        <button type="submit" class="btn btn-green">Enregistrer la propriété</button>
        <a href="/proprietes" class="btn" style="background: #6c757d;">Annuler</a>
    </form>
</div>
{% endblock %}
